<!DOCTYPE html><html lang="th"><head><base target="_top"><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>MT Weekly Activity</title><link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet"><style> :root {
    --bg: #0d0f14;
    --surface: #151821;
    --surface2: #1c2030;
    --border: #252a3a;
    --text: #e4e8f0;
    --muted: #64748b;
    --plan: #3b82f6;
    --plan-bg: rgba(59, 130, 246, .12);
    --urgent: #f97316;
    --urgent-bg: rgba(249, 115, 22, .12);
    --cancel: #64748b;
    --cancel-bg: rgba(100, 116, 139, .1);
    --unplan: #eab308;
    --unplan-bg: rgba(234, 179, 8, .1);
    --sis: #a855f7;
    --sis-bg: rgba(168, 85, 247, .12);
    --cold: #38bdf8;
    --hot: #fb923c;
    --accent: #f97316;
    --new: #ef4444;
    --new-bg: rgba(239, 68, 68, 0.12);
    --loto-bg: rgba(234, 179, 8, 0.15);
    --mono: 'JetBrains Mono', monospace;
    --thai: 'Prompt', sans-serif;
}

body.theme-light {
    --bg: #f8fafc;
    --surface: #ffffff;
    --surface2: #f1f5f9;
    --border: #e2e8f0;
    --text: #0f172a;
    --muted: #64748b;
    --plan: #2563eb;
    --plan-bg: #eff6ff;
    --urgent: #ea580c;
    --urgent-bg: #fff7ed;
    --cancel: #94a3b8;
    --cancel-bg: #f8fafc;
    --unplan: #ca8a04;
    --unplan-bg: #fefce8;
    --sis: #9333ea;
    --sis-bg: #faf5ff;
    --cold: #0284c7;
    --hot: #ea580c;
    --accent: #2563eb;
    --new: #dc2626;
    --new-bg: #fef2f2;
    --loto-bg: #fef08a;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--thai);
    min-height: 100vh;
    overflow-x: hidden;
    transition: background 0.3s, color 0.3s;
}

header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 65px;
    position: sticky;
    top: 0;
    z-index: 100;
    transition: background 0.3s;
}

.logo {
    display: flex;
    align-items: center;
    gap: 12px;
}

.logo-icon {
    width: 32px;
    height: 32px;
    background: var(--accent);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--mono);
    font-weight: 700;
    font-size: 13px;
    color: #fff;
    letter-spacing: -1px;
}

.logo-text {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1.5px;
    color: var(--text);
}

.logo-sub {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--mono);
    margin-top: 2px;
}

.header-right {
    display: flex;
    gap: 24px;
    align-items: center;
}

.realtime-clock {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent);
    font-weight: 600;
    text-align: right;
}

.stat {
    text-align: right;
}

.stat-num {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 700;
    line-height: 1;
}

.stat-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 2px;
}

.theme-toggle {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-family: var(--thai);
    font-size: 13px;
    font-weight: 500;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
}

.theme-toggle:hover {
    border-color: var(--accent);
    color: var(--accent);
}

.filter-bar {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    transition: background 0.3s;
}

.filter-label {
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    font-family: var(--mono);
    margin-right: 4px;
}

.filter-group {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
}

.filter-btn {
    padding: 4px 12px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 12px;
    font-family: var(--mono);
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
}

.filter-btn:hover {
    border-color: var(--accent);
    color: var(--text);
}

.filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 600;
}

.divider {
    width: 1px;
    height: 24px;
    background: var(--border);
    margin: 0 4px;
}

.search-wrap input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 12px 6px 12px;
    color: var(--text);
    font-size: 13px;
    font-family: var(--thai);
    width: 220px;
    outline: none;
    transition: border-color .15s;
}

.search-wrap input:focus {
    border-color: var(--accent);
}

.view-toggle {
    display: flex;
}

.view-btn {
    padding: 5px 12px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 12px;
    font-family: var(--mono);
    cursor: pointer;
}

.view-btn.active {
    background: var(--surface);
    color: var(--text);
    border-color: var(--accent);
    z-index: 1;
    font-weight: 600;
}

main {
    padding: 20px 24px 40px;
}

.week-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 10px;
}

.day-col {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
}

.day-header {
    padding: 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface2);
}

.day-name {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--text);
}

.day-date {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
}

.day-count {
    font-family: var(--mono);
    font-size: 12px;
    background: var(--bg);
    padding: 2px 8px;
    border-radius: 10px;
    color: var(--muted);
    font-weight: 500;
}

.day-tasks {
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.task-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    cursor: pointer;
    transition: all .15s;
    border-left: 3px solid var(--plan);
}

.task-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(0, 0, 0, .1);
}

.task-card.is-loto {
    background: var(--loto-bg);
    border-color: rgba(234, 179, 8, 0.4);
}

.is-sis {
    color: var(--cold) !important;
}

.is-sis .task-equip {
    color: var(--cold) !important;
}

.is-sis .task-desc {
    color: var(--cold) !important;
}

.task-card.status-new {
    border-left-color: var(--new);
}

.task-card.status-cancelled {
    border-left-color: var(--cancel);
    opacity: 0.65;
    filter: grayscale(0.8);
}

.task-type-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 8px;
    flex-wrap: wrap;
}

.badge {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 4px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
}

.badge.plan {
    background: var(--plan-bg);
    color: var(--plan);
    border: 1px solid var(--plan);
}

.badge.new-badge {
    background: var(--new-bg);
    color: var(--new);
    border: 1px solid var(--new);
}

.badge.cancel {
    background: var(--cancel-bg);
    color: var(--cancel);
    border: 1px solid var(--cancel);
}

.badge.sis {
    background: var(--sis-bg);
    color: var(--sis);
    border: 1px solid var(--sis);
}

.badge.loto {
    background: var(--unplan-bg);
    color: var(--unplan);
    border: 1px solid var(--unplan);
}

.badge.simple-lock {
    background: #fef9c3;
    color: #a16207;
    border: 1px solid #eab308;
}

.badge.group {
    background: rgba(128, 128, 128, .1);
    color: var(--muted);
    border: 1px solid var(--border);
}

.task-equip {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent);
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 6px;
}

.task-desc {
    font-size: 13px;
    font-weight: 400;
    color: var(--text);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

.task-cancelled .task-desc {
    text-decoration: line-through;
}

.task-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 10px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
}

.task-resp {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
}

.list-view {
    display: none;
}

.list-view.visible {
    display: block;
    overflow-x: auto;
}

.week-grid.visible {
    display: grid;
}

.week-grid.hidden {
    display: none;
}

.list-table {
    width: 100%;
    min-width: 1100px;
    border-collapse: collapse;
    font-size: 13px;
}

.list-table th {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 12px 16px;
    text-align: left;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    font-weight: 600;
}

.list-table td {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
    line-height: 1.5;
}

.list-table tr {
    background: var(--surface);
    transition: background .1s;
}

.list-table tr:hover {
    background: var(--surface2);
}

.list-table tr.status-new {
    border-left: 3px solid var(--new);
}

.list-table tr.status-cancelled {
    border-left: 3px solid var(--cancel);
    opacity: 0.65;
    filter: grayscale(0.8);
}

.list-table tr.status-normal {
    border-left: 3px solid var(--plan);
}

.list-table tr.is-loto td {
    background: var(--loto-bg);
}

.list-table tr.is-simple-lock td {
    background: #fefce8;
}

.list-table tr.is-sis td {
    color: var(--cold);
}

.list-day-box {
    display: flex;
    flex-direction: column;
    gap: 4px;
}

.list-day {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
}

.list-date {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
}

.modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, .8);
    z-index: 200;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
}

.modal-overlay.open {
    display: flex;
}

.modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    width: 600px;
    padding: 28px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
}

.modal-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 24px;
}

.modal-close {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    width: 32px;
    height: 32px;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
}

.modal-close:hover {
    border-color: var(--accent);
    color: var(--text);
}

.modal-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
}

.modal-field {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
}

.modal-field.full {
    grid-column: 1 / -1;
}

.field-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.field-value {
    font-size: 14px;
    color: var(--text);
    font-weight: 400;
    line-height: 1.5;
}

#loading {
    text-align: center;
    padding: 60px;
    color: var(--accent);
    font-family: var(--mono);
    font-size: 14px;
}

@media (max-width: 1024px) {
    .week-grid {
        grid-template-columns: repeat(3, 1fr);
    }
}

@media (max-width: 768px) {
    .week-grid {
        grid-template-columns: 1fr;
    }

    .filter-bar {
        flex-direction: column;
        align-items: flex-start;
    }

    .search-wrap input {
        width: 100%;
    }

    .header-right {
        gap: 12px;
    }

    .stat-label {
        display: none;
    }
}


/* === UI Refresh: Corporate Elegant Layer === */
:root {
    --shadow-soft: 0 8px 24px rgba(15, 23, 42, 0.10);
    --shadow-hover: 0 12px 28px rgba(15, 23, 42, 0.16);
    --radius-xl: 14px;
    --radius-lg: 10px;
    --radius-md: 8px;
    --corporate-accent: #0f4c81;
    --corporate-accent-2: #1f6aa5;
}

body {
    background:
        linear-gradient(180deg, rgba(148, 163, 184, 0.10) 0%, transparent 30%),
        radial-gradient(900px 420px at -10% -15%, rgba(15, 76, 129, 0.14), transparent 55%),
        var(--bg);
}

body.theme-light {
    background:
        linear-gradient(180deg, rgba(148, 163, 184, 0.10) 0%, transparent 36%),
        radial-gradient(860px 380px at -10% -15%, rgba(15, 76, 129, 0.11), transparent 52%),
        #f3f6fa;
}

header {
    backdrop-filter: blur(8px);
    border-bottom: 1px solid color-mix(in srgb, var(--border) 82%, transparent);
    background: color-mix(in srgb, var(--surface) 92%, transparent);
    box-shadow: 0 3px 14px rgba(15, 23, 42, 0.08);
}

.logo-icon {
    border-radius: 8px;
    background: linear-gradient(135deg, var(--corporate-accent), var(--corporate-accent-2));
    box-shadow: 0 6px 14px rgba(15, 76, 129, 0.22);
}

.logo-text {
    letter-spacing: 1.2px;
}

.theme-toggle,
.view-btn,
.filter-btn,
#weekSelect,
#revSelect,
.search-wrap input {
    border-radius: 999px !important;
}

.theme-toggle {
    padding: 6px 14px;
    background: color-mix(in srgb, var(--surface2) 80%, transparent);
}

.filter-bar {
    position: sticky;
    top: 65px;
    z-index: 95;
    backdrop-filter: blur(6px);
    background: color-mix(in srgb, var(--surface2) 92%, transparent);
    border-bottom: 1px solid color-mix(in srgb, var(--border) 86%, transparent);
}

.filter-btn.active {
    background: var(--corporate-accent);
    border-color: var(--corporate-accent);
}

.search-wrap input {
    width: min(260px, 65vw);
    box-shadow: inset 0 1px 2px rgba(15, 23, 42, 0.06);
}

.search-wrap input:focus {
    border-color: var(--corporate-accent);
    box-shadow: 0 0 0 3px rgba(15, 76, 129, 0.14);
}

main {
    max-width: 1580px;
    margin: 0 auto;
    padding-top: 22px;
}

.week-grid {
    gap: 12px;
}

.day-col {
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow-soft);
    border-color: color-mix(in srgb, var(--border) 78%, transparent);
    transition: transform 0.18s ease, box-shadow 0.18s ease;
}

.day-col:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-hover);
}

.day-header {
    padding: 14px;
    background: linear-gradient(
        180deg,
        color-mix(in srgb, var(--surface2) 94%, transparent),
        color-mix(in srgb, var(--surface) 90%, transparent)
    );
}

.day-count {
    background: rgba(15, 76, 129, 0.10);
    border: 1px solid rgba(15, 76, 129, 0.22);
    color: var(--corporate-accent);
}

.task-card {
    border-radius: var(--radius-md);
    border-left-width: 4px;
    box-shadow: 0 2px 10px rgba(15, 23, 42, 0.08);
}

.task-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 22px rgba(15, 23, 42, 0.14);
}

.badge {
    border-radius: 999px;
    letter-spacing: 0.6px;
}

.list-view.visible {
    background: color-mix(in srgb, var(--surface) 97%, transparent);
    border: 1px solid color-mix(in srgb, var(--border) 84%, transparent);
    border-radius: var(--radius-xl);
    overflow: hidden;
    box-shadow: var(--shadow-soft);
}

.list-table th {
    position: sticky;
    top: 0;
    z-index: 2;
    background: color-mix(in srgb, var(--surface2) 96%, transparent);
}

.list-table tr {
    transition: background 0.14s ease, transform 0.14s ease;
}

.list-table tr:hover {
    transform: translateY(-1px);
}

.modal-overlay {
    background: rgba(2, 6, 23, 0.54);
}

.modal {
    border-radius: 14px;
    border: 1px solid color-mix(in srgb, var(--border) 86%, transparent);
    background: color-mix(in srgb, var(--surface) 96%, transparent);
    backdrop-filter: blur(10px);
    box-shadow: 0 18px 46px rgba(2, 6, 23, 0.24);
    animation: fadeUp 0.22s ease;
}

.modal-field {
    border-radius: var(--radius-lg);
}

@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@media (max-width: 768px) {
    header {
        height: auto;
        padding: 10px 14px;
        align-items: flex-start;
        gap: 10px;
    }

    .header-right {
        width: 100%;
        justify-content: space-between;
        flex-wrap: wrap;
    }

    .filter-bar {
        top: 84px;
        padding: 10px 14px;
    }

    main {
        padding: 16px 14px 26px;
    }

    .list-view.visible {
        border-radius: 12px;
    }

    .modal {
        width: min(94vw, 620px);
        padding: 18px;
    }

    .modal-grid {
        grid-template-columns: 1fr;
    }
}

/* === Dispatch Board Adapt Layer === */
body {
    background:
        radial-gradient(900px 500px at 12% 8%, rgba(56, 189, 248, 0.22), transparent 58%),
        radial-gradient(860px 500px at 92% 5%, rgba(244, 114, 182, 0.18), transparent 55%),
        #d7e4ea;
    padding: 20px;
}

.dispatch-shell {
    max-width: 1560px;
    margin: 0 auto;
    display: flex;
    gap: 14px;
    align-items: stretch;
    min-height: calc(100vh - 40px);
}

.dispatch-sidebar {
    width: 64px;
    border-radius: 12px;
    background: linear-gradient(180deg, #091225 0%, #0c1b2e 100%);
    border: 1px solid rgba(148, 163, 184, 0.18);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 8px;
    gap: 10px;
    box-shadow: 0 14px 34px rgba(9, 18, 37, 0.28);
}

.dispatch-brand {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    background: linear-gradient(140deg, #1d4ed8, #0ea5e9);
    color: #fff;
    display: grid;
    place-items: center;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 6px;
}

.dispatch-nav {
    display: flex;
    flex-direction: column;
    gap: 8px;
    width: 100%;
    align-items: center;
}

.dispatch-nav-btn {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    border: 1px solid rgba(148, 163, 184, 0.24);
    background: transparent;
    color: #cbd5e1;
    font-family: var(--mono);
    font-size: 11px;
    cursor: pointer;
    transition: 0.2s ease;
}

.dispatch-nav-btn:hover,
.dispatch-nav-btn.active {
    background: #1677ff;
    color: #fff;
    border-color: transparent;
}

.dispatch-nav-btn[data-action="refresh"] {
    margin-top: 8px;

function formatShortDate(dateString) {
    if ( !dateString) return '-';

    // เธ–เนเธฒเธกเธฑเธเธกเธตเธเธณเธงเนเธฒ GMT เธซเธฃเธทเธญ เน€เธงเธฅเธฒเธญเธดเธเนเธ”เธเธตเธ เนเธซเนเธ”เธถเธเน€เธเธเธฒเธฐเธเนเธงเธ "Mar 23 2026"
    if (dateString.length > 15 && dateString.includes('GMT')) {
        return dateString.substring(4, 15);
    }

    // เธ—เนเธฒเธกเธฒเธ•เธฃเธเธฒเธ
    try {
        const d=new Date(dateString);

        if ( !isNaN(d.getTime())) {
            const months=["Jan",
            "Feb",
            "Mar",
            "Apr",
            "May",
            "Jun",
            "Jul",
            "Aug",
            "Sep",
            "Oct",
            "Nov",
            "Dec"];

            return `${
                months[d.getMonth()]
            }

            ${
                d.getDate()
            }

            ${
                d.getFullYear()
            }

            `;
        }
    }

    catch(e) {}

    return dateString;
}

let currentWeek='';

let pendingWeek='';
let weekDataCache={};

function buildDispatchChrome() {
    if (document.getElementById('dispatchShell')) {
        return;
    }

    const header=document.querySelector('body > header');
    const filterBar=document.querySelector('body > .filter-bar');
    const main=document.querySelector('body > main');

    if (!header || !filterBar || !main) {
        return;
    }

    const shell=document.createElement('div');
    shell.id='dispatchShell';
    shell.className='dispatch-shell';

    const sidebar=document.createElement('aside');
    sidebar.className='dispatch-sidebar';
    sidebar.innerHTML=`<div class="dispatch-brand">MT</div>
        <div class="dispatch-side-title">Operations</div>
        <div class="dispatch-nav">
            <button class="dispatch-nav-btn active" data-action="week" type="button" title="Week Board">Board</button>
            <button class="dispatch-nav-btn" data-action="list" type="button" title="List View">Table</button>
            <button class="dispatch-nav-btn" data-action="today" type="button" title="Today Only">Today</button>
            <button class="dispatch-nav-btn" data-action="new" type="button" title="New Tasks">New</button>
            <button class="dispatch-nav-btn" data-action="cancelled" type="button" title="Cancelled Tasks">Cancelled</button>
            <button class="dispatch-nav-btn" data-action="loto" type="button" title="LOTO / Simple Lock">LOTO</button>

            <button class="dispatch-nav-btn" data-action="refresh" type="button" title="Reload Week">Refresh</button>
        </div>`;

    const board=document.createElement('div');
    board.className='dispatch-board';
    board.innerHTML=`<div class="dispatch-board-top">
            <div class="dispatch-board-title">Maintenance Operations Board</div>
            <div class="dispatch-board-meta" id="dispatchBoardMeta">MT Weekly Operations</div>
        </div>
        <div class="dispatch-frame"></div>`;

    shell.appendChild(sidebar);

    header.parentNode.insertBefore(shell, header);

    const frame=board.querySelector('.dispatch-frame');
    frame.appendChild(header);

    sidebar.querySelectorAll('.dispatch-nav-btn').forEach(btn=> {

window.onload=()=> {

function loadInitialData() {
    fetchWeeklyData('');
}

function renderOptionList(values) {
    return values.map(v=> `<option value="${v}">${v}</option>`).join('');
}

function normalizeArea(value) {
    return (value || '-').toString()
        .replace(/\s*&\s*/g, '/')
        .replace(/\s*\/\s*/g, '/')
        .replace(/\s+/g, ' ')
        .trim()
        .toUpperCase();
}

function getAreaClass(areaValue) {
    const area=normalizeArea(areaValue);
    if (area.includes('CP')) return 'area-cp';
    if (area.includes('ISBL')) return 'area-isbl';
    if (area.includes('B6/LG') || area.includes('B6LG')) return 'area-b6lg';
    if (area==='CCB') return 'area-ccb';
    if (area==='SSP') return 'area-ssp';
    if (area==='UT') return 'area-ut';
    if (area==='SSP/UT') return 'area-ssput';
    return 'area-other';
}

function getSafetyMode(swpValue) {
    const text=(swpValue || '').toString().toUpperCase().replace(/\s+/g, ' ').trim();
    const compact=text.replace(/\s+/g, '');

    if (compact.includes('SIMPLELOCK')) {
        return 'simple-lock';
    }

    if (text.includes('LOTO') || /(^|[^A-Z0-9])LB([^A-Z0-9]|$)/.test(text) || /L\s*\/\s*B/.test(text)) {
        return 'loto-lb';
    }

    return '';
}

function sortAreas(values) {
    const priorityIndex=new Map(AREA_PRIORITY.map((v, i)=> [v, i]));
    return [...values].sort((a, b)=> {
            const ia=priorityIndex.has(a) ? priorityIndex.get(a) : Number.MAX_SAFE_INTEGER;
            const ib=priorityIndex.has(b) ? priorityIndex.get(b) : Number.MAX_SAFE_INTEGER;
            if (ia!==ib) return ia-ib;
            return a.localeCompare(b);
        });
}

function cloneTasks(tasks) {
    return (tasks||[]).map(t=> Object.assign({}, t));
}

function setWeekCache(week, tasks) {
    if (!week) return;
    weekDataCache[week]=cloneTasks(tasks);
}

function getWeekCache(week) {
    if (!week || !weekDataCache[week]) return null;
    return cloneTasks(weekDataCache[week]);
}

function useWeekFromCache(selectedWeek) {
    const cachedTasks=getWeekCache(selectedWeek);
    if (!cachedTasks) return false;

    currentWeek=selectedWeek;
    fullDataStore=cachedTasks;

    const weekSelect=document.getElementById('weekSelect');
    if (weekSelect) {
        weekSelect.value=selectedWeek;
    }

    document.getElementById('loading').style.display='none';
    updateDispatchMeta();
    applyCurrentWeekData();
    return true;
}

function finishWeekLoading() {
    const weekSelect=document.getElementById('weekSelect');

    if (weekSelect) {
        weekSelect.disabled=false;
    }

    if (pendingWeek && pendingWeek!==currentWeek) {
        const nextWeek=pendingWeek;
        pendingWeek='';
        if (useWeekFromCache(nextWeek)) {
            return;
        }
        fetchWeeklyData(nextWeek);
        return;
    }

    pendingWeek='';
}

function updateDispatchMeta() {
    const metaEl=document.getElementById('dispatchBoardMeta');
    if (!metaEl) return;

    const cachedCount=Object.keys(weekDataCache).length;
    const totalWeeks=allWeeksCache.length;

    if (currentWeek) {
        metaEl.innerText=`${currentWeek} | Cache ${cachedCount}/${totalWeeks || cachedCount}`;
        return;
    }

    metaEl.innerText='MT Weekly Operations';
}

function setSidebarActive(action) {
    document.querySelectorAll('.dispatch-nav-btn').forEach(btn=> {
        btn.classList.toggle('active', btn.dataset.action===action);
    });
}

function resetFiltersToAll() {
    activeDays=new Set(availableDays);
    activeGroups=new Set(availableGroups);
    activeAreas=new Set(availableAreas);
    activeStatuses=new Set(STATUSES);
    document.getElementById('searchInput').value='';
    updateFilters();
    render();
}

function setStatusOnly(status) {
    if (!status) return;
    activeStatuses=new Set([status]);
    updateFilters();
    render();
}

function handleSidebarAction(action) {
    if (!action) return;

    if (action==='week') {
        setSidebarActive(action);
        setView('week');
        return;
    }

    if (action==='list') {
        setSidebarActive(action);
        setView('list');
        return;
    }

    if (action==='today') {
        const todayStr=new Date().toLocaleDateString('en-US', { weekday: 'short' }).toUpperCase();
        if (availableDays.includes(todayStr)) {
            activeDays=new Set([todayStr]);
        } else if (availableDays.length > 0) {
            activeDays=new Set([availableDays[0]]);
        }
        updateFilters();
        render();
        setSidebarActive(action);
        return;
    }

    if (action==='new') {
        setStatusOnly('NEW');
        setSidebarActive(action);
        return;
    }

    if (action==='cancelled') {
        setStatusOnly('CANCELLED');
        setSidebarActive(action);
        return;
    }

    if (action==='loto') {
        document.getElementById('searchInput').value='loto';
        render();
        setSidebarActive(action);
        return;
    }

    if (action==='reset') {
        resetFiltersToAll();
        setSidebarActive('week');
        return;
    }

    if (action==='refresh') {
        const targetWeek=currentWeek || document.getElementById('weekSelect').value || '';
        if (targetWeek) {
            if (isWeekLoading) {
                pendingWeek=targetWeek;
                return;
            }
            delete weekDataCache[targetWeek];
            fetchWeeklyData(targetWeek);
        }
    }
}

function requestWeekData(requestedWeek, onSuccess, onFailure) {
    const requestUrl=requestedWeek
        ? API_URL + '?action=compareRevisions&week=' + encodeURIComponent(requestedWeek)
        : API_URL + '?action=compareRevisions';

    if (typeof google !=='undefined' && google.script && google.script.run) {
        google.script.run
            .withSuccessHandler(onSuccess)
            .withFailureHandler(onFailure)
            .compareRevisions(requestedWeek);
        return;
    }

    fetch(requestUrl, { method: 'GET' })
        .then(res=> {
            if (!res.ok) throw new Error('HTTP ' + res.status);
            return res.json();
        })
        .then(onSuccess)
        .catch(onFailure);
}

function startPrefetchAllWeeks() {
    if (isPrefetching || allWeeksCache.length===0) return;

    prefetchQueue=allWeeksCache.filter(w=> w && !weekDataCache[w] && w!==currentWeek);
    if (prefetchQueue.length===0) {
        updateDispatchMeta();
        return;
    }

    isPrefetching=true;
    prefetchNextWeek();
}

function prefetchNextWeek() {
    if (prefetchQueue.length===0) {
        isPrefetching=false;
        updateDispatchMeta();
        return;
    }

    const week=prefetchQueue.shift();
    requestWeekData(week, result=> {
        if (result && Array.isArray(result.allTasks)) {
            const selected=result.selectedWeek || week;
            const tasks=result.allTasks.filter(t=> t.week===selected);
            setWeekCache(selected, tasks);
        }
        updateDispatchMeta();
        setTimeout(prefetchNextWeek, 80);
    }, ()=> {
        setTimeout(prefetchNextWeek, 120);
    });
}

function fetchWeeklyData(selectedWeek) {
    const loadingEl=document.getElementById('loading');
    const weekSelect=document.getElementById('weekSelect');
    const requestedWeek=selectedWeek || '';

    isWeekLoading=true;
    if (weekSelect) {
        weekSelect.disabled=true;
    }
    loadingEl.style.display='block';
    loadingEl.innerText=requestedWeek
        ? 'กำลังโหลดข้อมูลของ ' + requestedWeek + '...'
        : 'กำลังซิงค์ข้อมูลจากฐานข้อมูล...';

    requestWeekData(requestedWeek, result=> {
        isWeekLoading=false;
        initApp(result, requestedWeek);
        finishWeekLoading();
    }, err=> {
        isWeekLoading=false;
        loadingEl.innerText="Sync ไม่สำเร็จ: " + (err && err.message ? err.message : "Unknown error");
        finishWeekLoading();
    });
}

function initApp(result, fallbackWeek) {
    if ( !result || !Array.isArray(result.allTasks)) {
        document.getElementById('loading').innerText="เกิดข้อผิดพลาดในการโหลดข้อมูล";
        return;
    }

    fullDataStore=result.allTasks;
    const weeks=result.allWeeks || [];
    if (weeks.length > 0) {
        allWeeksCache=weeks.slice();
    }
    currentWeek=result.selectedWeek || fallbackWeek || '';
    if (!currentWeek && weeks.length > 0) {
        currentWeek=weeks[0];
    }
    if (currentWeek) {
        fullDataStore=fullDataStore.filter(t=> t.week===currentWeek);
    }
    setWeekCache(currentWeek, fullDataStore);

    const select=document.getElementById('weekSelect');

    if (select) {
        const weekOptions=allWeeksCache.length > 0 ? allWeeksCache : weeks;
        select.innerHTML=renderOptionList(weekOptions);

        if (currentWeek) {
            select.value=currentWeek;
        } else if (weekOptions.length > 0) {
            select.value=weekOptions[0];
        }
    }

    document.getElementById('loading').style.display='none';
    document.getElementById('logoSub').innerText=fullDataStore.length > 0
        ? "ซิงค์ข้อมูลล่าสุดสำเร็จแล้ว"
        : "ไม่พบข้อมูลงานในสัปดาห์นี้";

    updateDispatchMeta();
    applyCurrentWeekData();
    startPrefetchAllWeeks();
}

// ๐ 1. เน€เธกเธทเนเธญเน€เธฅเธทเธญเธเธชเธฑเธเธ”เธฒเธซเน (เธเธฐเธซเธฒเธงเนเธฒเธชเธฑเธเธ”เธฒเธซเนเธเธตเนเธกเธตเธเธตเน Rev เนเธฅเนเธงเน€เธญเธฒเธกเธฒเนเธเธงเน)
function changeWeek(selectedWeek) {
    if (!selectedWeek) {
        return;
    }

    if (isWeekLoading) {
        pendingWeek=selectedWeek;
        return;
    }

    if (selectedWeek===currentWeek) {
        applyCurrentWeekData();
        return;
    }

    if (useWeekFromCache(selectedWeek)) {
        return;
    }

    fetchWeeklyData(selectedWeek);
}

function applyCurrentWeekData() {
    const selectedWeek=currentWeek || document.getElementById('weekSelect').value || '';
    const weekTasks=selectedWeek
        ? fullDataStore.filter(t=> t.week===selectedWeek)
        : fullDataStore;

    // เธซเธฒ Rev เธ—เธฑเนเธเธซเธกเธ”เธ—เธตเนเธกเธตเนเธเธชเธฑเธเธ”เธฒเธซเนเธเธตเน เนเธฅเนเธงเน€เธฃเธตเธขเธเธฅเธณเธ”เธฑเธ
    const revs=[...new Set(weekTasks.map(t=> t.rev))].filter(Boolean).sort();
    const revSelect=document.getElementById('revSelect');

    if (revs.length > 0) {

        // เธเธณเธฃเธฒเธขเธเธทเนเธญ Rev เธกเธฒเนเธชเนเนเธ Dropdown เธ—เธตเน 2
        revSelect.innerHTML=renderOptionList(revs);
        revSelect.style.display='block'; // เนเธเธงเน Dropdown เธเธญเธ Rev เธ—เธฑเธเธ—เธต

        // เธเธฑเธเธเธฑเธเน€เธฅเธทเธญเธ Rev เธฅเนเธฒเธชเธธเธ”เน€เธเนเธเธเนเธฒเน€เธฃเธดเนเธกเธ•เนเธ
        const latestRev=revs[revs.length - 1];
        revSelect.value=latestRev;

        // เธชเนเธเนเธกเนเธ•เนเธญเนเธซเนเธเธฑเธเธเนเธเธฑเธเธเธณเธเธงเธ“เธเธฒเธ
        changeRev(latestRev);
    }

    else {
        // เธ–เนเธฒเธชเธฑเธเธ”เธฒเธซเนเธเธฑเนเธเนเธกเนเธกเธตเธเนเธญเธกเธนเธฅเน€เธฅเธข เธเนเธเนเธญเธ Dropdown เธเธญเธ Rev เนเธ
        revSelect.style.display='none';
        revSelect.innerHTML='';
        allData=[];
        renderAfterDataChange();
    }
}

// ๐ 2. เน€เธกเธทเนเธญเน€เธฅเธทเธญเธ Rev เธขเนเธญเธข (เธฃเธฐเธเธเธเธฐเธ”เธถเธ Rev เธเนเธญเธเธซเธเนเธฒเธกเธฒเน€เธเธฃเธตเธขเธเน€เธ—เธตเธขเธเธซเธฒ NEW/CANCEL)
function changeRev(selectedRev) {
    const selectedWeek=currentWeek || document.getElementById('weekSelect').value || '';
    const weekTasks=selectedWeek
        ? fullDataStore.filter(t=> t.week===selectedWeek)
        : fullDataStore;
    const revs=[...new Set(weekTasks.map(t=> t.rev))].filter(Boolean).sort();

    // เธซเธฒเธงเนเธฒ Rev เธ—เธตเนเน€เธฃเธฒเน€เธฅเธทเธญเธเธญเธขเธนเนเธฅเธณเธ”เธฑเธเธ—เธตเนเน€เธ—เนเธฒเนเธซเธฃเน เธเธฐเนเธ”เนเนเธเธซเธฒ Rev เธ•เธฑเธงเธเนเธญเธเธซเธเนเธฒเธกเธฒเน€เธ—เธตเธขเธเธ–เธนเธ
    const currentRevIndex=revs.indexOf(selectedRev);
    const prevRev=currentRevIndex>0 ? revs[currentRevIndex - 1]: null;

    const currentData=weekTasks.filter(t=> t.rev===selectedRev);
    const oldData=prevRev ? weekTasks.filter(t=> t.rev===prevRev): [];

    allData=[];

    function makeKey(t) {
        return t.date+"|"+t.equipment+"|"+t.description;
    }

    const currentKeys=currentData.map(makeKey);
    const oldKeys=oldData.map(makeKey);

    // เธชเนเธเธเธซเธฒเธเธฒเธ NEW เนเธฅเธฐ NORMAL
    currentData.forEach(t=> {
            const key=makeKey(t);
            t.status=(oldData.length > 0 && !oldKeys.includes(key)) ? "NEW" : "NORMAL";
            allData.push(t);
        });

    // เธชเนเธเธเธซเธฒเธเธฒเธ CANCELLED
    if (oldData.length > 0) {
        oldData.forEach(t=> {
                const key=makeKey(t);

                if ( !currentKeys.includes(key)) {
                    t.status="CANCELLED";
                    allData.push(t);
                }
            });
    }

    // เธญเธฑเธเน€เธ”เธ•เธซเธเนเธฒเธเธญ
    renderAfterDataChange();
}

// ๐ 3. เธเธฑเธเธเนเธเธฑเธเธชเธณเธซเธฃเธฑเธเธงเธฒเธ”เธซเธเนเธฒเธเธญเนเธซเธกเนเธซเธฅเธฑเธเธเธฒเธเธเธณเธเธงเธ“เธเนเธญเธกเธนเธฅเน€เธชเธฃเนเธ

else {

function buildFilters() {
    buildGroup('dayFilters', availableDays, activeDays);
    buildGroup('groupFilters', availableGroups, activeGroups);
    buildGroup('areaFilters', availableAreas, activeAreas);
    buildGroup('statusFilters', STATUSES, activeStatuses);
}

function buildGroup(containerId, items, activeSet) {
    const el=document.getElementById(containerId);
    el.innerHTML='';
    const all=document.createElement('button');
    all.className='filter-btn'+(activeSet.size===items.length ? ' active' : '');
    all.textContent='ALL';

    all.onclick=()=> {
        const isAllSelected=items.length > 0 && activeSet.size===items.length;

        if (isAllSelected) {
            activeSet.clear();
        }

        else {
            items.forEach(i=> activeSet.add(i));
        }

        updateFilters();
        render();
    }

    ;
    el.appendChild(all);

    items.forEach(item=> {
            const btn=document.createElement('button');
            btn.className='filter-btn' + (activeSet.has(item) ? ' active' : '');
            btn.textContent=item;

            btn.onclick=()=> {
                if (activeSet.has(item)) activeSet.delete(item); else activeSet.add(item);
                updateFilters(); render();
            }

            ;
            el.appendChild(btn);
        });
}

function updateFilters() {
    buildGroup('dayFilters', availableDays, activeDays);
    buildGroup('groupFilters', availableGroups, activeGroups);
    buildGroup('areaFilters', availableAreas, activeAreas);
    buildGroup('statusFilters', STATUSES, activeStatuses);
}

function setupWeekScrollSync() {
    const top=document.getElementById('weekScrollTop');
    const wrap=document.getElementById('weekGridWrap');

    if (!top || !wrap || top.dataset.bound==='1') {
        return;
    }

    top.dataset.bound='1';

    top.addEventListener('scroll', ()=> {
            if (isWeekScrollSyncing) return;
            isWeekScrollSyncing=true;
            wrap.scrollLeft=top.scrollLeft;
            isWeekScrollSyncing=false;
        }, { passive: true });

    wrap.addEventListener('scroll', ()=> {
            if (isWeekScrollSyncing) return;
            isWeekScrollSyncing=true;
            top.scrollLeft=wrap.scrollLeft;
            isWeekScrollSyncing=false;
        }, { passive: true });

    window.addEventListener('resize', syncWeekScrollWidth);
    syncWeekScrollWidth();
}

function syncWeekScrollWidth() {
    const top=document.getElementById('weekScrollTop');
    const topInner=document.getElementById('weekScrollTopInner');
    const wrap=document.getElementById('weekGridWrap');
    const grid=document.getElementById('weekView');

    if (!top || !topInner || !wrap || !grid) {
        return;
    }

    const gap=12;
    const visibleColumns=5;
    const dayWidth=Math.max(190, Math.floor((wrap.clientWidth - (gap * (visibleColumns - 1))) / visibleColumns));
    grid.style.setProperty('--day-col-width', dayWidth + 'px');

    const contentWidth=(dayWidth * 7) + (gap * 6);
    topInner.style.width=contentWidth + 'px';
    top.style.display=contentWidth > wrap.clientWidth + 2 ? 'block' : 'none';
    top.scrollLeft=wrap.scrollLeft;
}

            const areaValue=normalizeArea(r.area);
            const areaPass=AREA_HIDDEN.has(areaValue) ? true : activeAreas.has(areaValue);
            return activeDays.has(d) && activeGroups.has(r.group) && areaPass && activeStatuses.has(r.status) && (!q || searchable.includes(q));
        });
}

function render() {
    const data=getFiltered();
    updateHeaderStats(data);
    if (viewMode==='week') renderWeek(data);
    else renderList(data);
}

function updateHeaderStats(data) {
    const newTasks=data.filter(r=> r.status==='NEW').length;
    const cancelled=data.filter(r=> r.status==='CANCELLED').length;

    document.getElementById('headerStats').innerHTML=` <div class="stat"><div class="stat-num">${
        data.length
    }

    </div><div class="stat-label">Tasks</div></div><div class="stat"><div class="stat-num" style="color:var(--new)">${
        newTasks
    }

    </div><div class="stat-label">New Added</div></div><div class="stat"><div class="stat-num" style="color:var(--cancel)">${
        cancelled
    }

    </div><div class="stat-label">Cancelled</div></div>`;
}

function renderWeek(data) {
    const weekView=document.getElementById('weekView');
    weekView.innerHTML='';
    weekView.classList.add('visible');

    availableDays.forEach(day=> {
            const tasks=data.filter(r=> (r.day||'').toUpperCase().startsWith (day));
            const col=document.createElement('div');
            col.className='day-col';

            // ๐ เธ”เธถเธเธงเธฑเธเธ—เธตเนเธกเธฒเนเธเธฅเธเนเธซเนเธชเธฑเนเธเธฅเธ
            const dateStr=tasks.length > 0 ? formatShortDate(tasks[0].date) : '';

            col.innerHTML=` <div class="day-header" style="display:flex; flex-direction:column; align-items:flex-start;" > <div style="display:flex; justify-content:space-between; width:100%; align-items:center;" > <div class="day-name" >${
                day
            }

            </div> <div class="day-count" >${
                tasks.length
            }

            </div> </div> <div class="day-date" >${
                dateStr
            }

            </div> </div> <div class="day-tasks" ></div> `;

            const body=col.querySelector('.day-tasks');
            if (tasks.length===0) body.innerHTML='<div class="empty-day" style="text-align:center; padding:20px; color:var(--muted)">-</div>';
            else tasks.forEach(t=> body.appendChild(makeCard(t)));

            weekView.appendChild(col);
        });

    syncWeekScrollWidth();
}

function makeCard(t) {
    const card=document.createElement('div');
    const swpText=(t.swp || '').toUpperCase();
    const safetyMode=getSafetyMode(swpText);
    const isLoto=safetyMode==='loto-lb';
    const isSimpleLock=safetyMode==='simple-lock';
    const isLockTask=!!safetyMode;
    const isSis=(t.moc||'').toUpperCase().includes('SIS') || (t.jobType||'').toUpperCase().includes('SIS') || (t.group||'').toUpperCase().includes('SIS');
    const isNew=t.status==='NEW';
    const isCan=t.status==='CANCELLED';
    const areaClass=getAreaClass(t.area);

    card.className=`task-card status-${
        t.status.toLowerCase()
    }

    ${
        areaClass
    }

    `;
    if(isLockTask) card.classList.add('is-loto');
    if(isLoto) card.classList.add('safety-loto');
    if(isSimpleLock) card.classList.add('safety-simple-lock');
    if(isSis) card.classList.add('is-sis');
    if(isCan) card.classList.add('task-cancelled');

    let chips=`<span class="task-chip">${t.jobType || '-'}</span>`;
    if(isNew) chips+=`<span class="task-chip is-danger">NEW</span>`;
    if(isCan) chips+=`<span class="task-chip is-danger">CANCEL</span>`;
    if(isLoto) chips+=`<span class="task-chip is-warn">LOTO/LB</span>`;
    if(isSimpleLock) chips+=`<span class="task-chip is-warn">SIMPLE LOCK</span>`;
    if(isSis) chips+=`<span class="task-chip is-accent">SIS</span>`;

    const whenText=(t.day || '-') + ' • ' + formatShortDate(t.date || '');
    const revText=t.rev ? t.rev : 'REV';
    const description=t.description || '-';

    card.innerHTML=`<div class="task-strip"></div>
        <div class="task-card-inner">
            <div class="task-meta-line">
                <div class="task-ref">${whenText}</div>
                <div class="task-ref">${revText}</div>
            </div>
            <div class="task-equip">${t.equipment || 'N/A'}</div>
            <div class="task-desc">${description}</div>
            <div class="task-chip-row">${chips}</div>
            <div class="task-footer"><div class="task-resp">${t.group || '-'}</div><div class="task-resp">${t.area || '-'}</div></div>
        </div>`;
    card.onclick=()=>openModal(t, safetyMode, isSis, isNew, isCan);
    return card;
}

function renderList(data) {
    const body=document.getElementById('listBody');
    body.innerHTML='';

    data.forEach(t=> {
            const swpText=(t.swp || '').toUpperCase();
            const safetyMode=getSafetyMode(swpText);
            const isLoto=safetyMode==='loto-lb';
            const isSimpleLock=safetyMode==='simple-lock';
            const isLockTask=!!safetyMode;
            const isSis=(t.moc||'').toUpperCase().includes('SIS') || (t.jobType||'').toUpperCase().includes('SIS') || (t.group||'').toUpperCase().includes('SIS');

            const tr=document.createElement('tr');
            tr.className=`status-${t.status.toLowerCase()}`;
            if (isLoto) tr.classList.add('is-loto');
            if (isSimpleLock) tr.classList.add('is-simple-lock');
            if (isSis) tr.classList.add('is-sis');

            let statusBadge='';
            if(t.status==='NEW') statusBadge='<br><span class="badge new-badge" style="margin-top:6px">NEW</span>';
            if(t.status==='CANCELLED') statusBadge='<br><span class="badge cancel" style="margin-top:6px">CANCEL</span>';

            // ๐ เนเธเธฅเธเธงเธฑเธเธ—เธตเนเนเธซเนเธชเธฑเนเธเธฅเธเนเธเธซเธเนเธฒ List เธ”เนเธงเธข
            const cleanDate=formatShortDate(t.date);

            tr.innerHTML=` <td> <div class="list-day-box" > <span class="list-day" >${
                t.day||'-'
            }

            </span> <span class="list-date" >${
                cleanDate
            }

            </span> </div> </td> <td><span class="badge plan" >${
                t.jobType||'-'
            }

            </span><br><small style="color:var(--muted);font-size:11px;font-family:var(--mono);" >${
                t.moc||'-'
            }

            </small>${
                statusBadge
            }

            </td> <td style="font-family:var(--mono);font-size:14px;font-weight:600;color:var(--accent);" >${
                t.equipment||'-'
            }

            </td> <td style="max-width:320px;line-height:1.6;font-size:13px; ${t.status==='CANCELLED'?'text-decoration:line-through;color:var(--muted)':''}" >${
                t.description
            }

            </td> <td><span class="badge group" >${
                t.group||'-'
            }

            </span></td> <td><span style="font-size:12px;color:var(--muted)" >${
                t.workType||'-'
            }

            </span></td> <td style="font-family:var(--mono);font-size:12px; ${isLockTask?'color:var(--unplan);font-weight:700':''}" >${
                t.swp||'-'
            }

            </td> <td><span style="font-size:12px" >${
                t.area||'-'
            }

            </span></td> <td style="font-family:var(--mono);font-size:12px;color:var(--muted)" >${
                t.resp||'-'
            }

            </td> `;
            tr.style.cursor='pointer';
            tr.onclick=()=> openModal(t, safetyMode, isSis, t.status==='NEW', t.status==='CANCELLED');
            body.appendChild(tr);
        });
}

function openModal(t, safetyMode, isSis, isNew, isCan) {
    const isLoto=safetyMode==='loto-lb';
    const isSimpleLock=safetyMode==='simple-lock';
    let badges='';
    if(isNew) badges+=`<span class="badge new-badge">NEW</span>`;
    if(isCan) badges+=`<span class="badge cancel">CANCELLED</span>`;
    if(isLoto) badges+=`<span class="badge loto">LOTO/LB</span>`;
    if(isSimpleLock) badges+=`<span class="badge simple-lock">SIMPLE LOCK</span>`;
    if(isSis) badges+=`<span class="badge sis">SIS</span>`;

    badges+=`<span class="badge plan">${
        t.jobType || '-'
    }

    </span>`;

    badges+=`<span class="badge group">${
        t.group || '-'
    }

    </span>`;

    document.getElementById('modalTitle').innerHTML=` <div style="display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap">${
        badges
    }

    </div><div style="font-family:var(--mono);color:var(--accent);font-size:16px;margin-bottom:10px;font-weight:700;">${
        t.equipment||'N/A'
    }

    </div><div style="font-size:14px;font-weight:400;color:var(--text);line-height:1.6; ${isCan?'text-decoration:line-through;color:var(--muted)':''}">${
        t.description
    }

    </div>`;

    // ๐ เนเธเธฅเธเธงเธฑเธเธ—เธตเนเนเธ Modal เนเธซเนเธชเธฑเนเธเธ”เนเธงเธข
    const cleanDate=formatShortDate(t.date);

    const fields=[ {

        label:"Day / Date",
        value:`${
            t.day||'-'
        }

        ยท ${
            cleanDate
        }

        `,
        full:false
    }

    ,
    {
    label: "Area", value:t.area||'-', full:false
}

,
{
label: "Responsible", value:t.resp||'-', full:false
}

,
{
label: "Status", value:t.status, full:false
}

,
{
label: "Work Type", value:t.workType||'-', full:false
}

,
{
label: "MOC/TMOC", value:t.moc||'-', full:false
}

,
{
label: "SWP Document", value:t.swp||'-', full:true
}

];

document.getElementById('modalGrid').innerHTML=fields.map(f=> ` <div class="modal-field ${f.full?'full':''}" > <div class="field-label" >${
        f.label
    }

    </div> <div class="field-value ${f.label!=='Work Description' ? 'mono' : ''}" >${
        f.value
    }

    </div> </div> `).join('');
document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) {
    if (e.target===document.getElementById('modalOverlay')) closeModalDirect();
}

function closeModalDirect() {
    document.getElementById('modalOverlay').classList.remove('open');
}

document.addEventListener('keydown', e=> {
        if (e.key==='Escape') closeModalDirect();
    });
</script></body></html>
