<!DOCTYPE html><html lang="th"><head><base target="_top"><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>MT Weekly Activity</title><link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet"><style> :root {
    --bg: #0d0f14;
    --surface: #151821;
    --surface2: #1c2030;
    --border: #252a3a;
    --text: #e4e8f0;
    --muted: #64748b;
    --plan: #3b82f6;
    --plan-bg: rgba(59, 130, 246, .12);
    --urgent: #f97316;
    --urgent-bg: rgba(249, 115, 22, .12);
    --cancel: #64748b;
    --cancel-bg: rgba(100, 116, 139, .1);
    --unplan: #eab308;
    --unplan-bg: rgba(234, 179, 8, .1);
    --sis: #a855f7;
    --sis-bg: rgba(168, 85, 247, .12);
    --cold: #38bdf8;
    --hot: #fb923c;
    --accent: #f97316;
    --new: #ef4444;
    --new-bg: rgba(239, 68, 68, 0.12);
    --loto-bg: rgba(234, 179, 8, 0.15);
    --mono: 'JetBrains Mono', monospace;
    --thai: 'Prompt', sans-serif;
}

body.theme-light {
    --bg: #f8fafc;
    --surface: #ffffff;
    --surface2: #f1f5f9;
    --border: #e2e8f0;
    --text: #0f172a;
    --muted: #64748b;
    --plan: #2563eb;
    --plan-bg: #eff6ff;
    --urgent: #ea580c;
    --urgent-bg: #fff7ed;
    --cancel: #94a3b8;
    --cancel-bg: #f8fafc;
    --unplan: #ca8a04;
    --unplan-bg: #fefce8;
    --sis: #9333ea;
    --sis-bg: #faf5ff;
    --cold: #0284c7;
    --hot: #ea580c;
    --accent: #2563eb;
    --new: #dc2626;
    --new-bg: #fef2f2;
    --loto-bg: #fef08a;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--thai);
    min-height: 100vh;
    overflow-x: hidden;
    transition: background 0.3s, color 0.3s;
}

header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 65px;
    position: sticky;
    top: 0;
    z-index: 100;
    transition: background 0.3s;
}

.logo {
    display: flex;
    align-items: center;
    gap: 12px;
}

.logo-icon {
    width: 32px;
    height: 32px;
    background: var(--accent);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--mono);
    font-weight: 700;
    font-size: 13px;
    color: #fff;
    letter-spacing: -1px;
}

.logo-text {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1.5px;
    color: var(--text);
}

.logo-sub {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--mono);
    margin-top: 2px;
}

.header-right {
    display: flex;
    gap: 24px;
    align-items: center;
}

.realtime-clock {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent);
    font-weight: 600;
    text-align: right;
}

.stat {
    text-align: right;
}

.stat-num {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 700;
    line-height: 1;
}

.stat-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 2px;
}

.theme-toggle {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-family: var(--thai);
    font-size: 13px;
    font-weight: 500;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
}

.theme-toggle:hover {
    border-color: var(--accent);
    color: var(--accent);
}

.filter-bar {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    transition: background 0.3s;
}

.filter-label {
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    font-family: var(--mono);
    margin-right: 4px;
}

.filter-group {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
}

.filter-btn {
    padding: 4px 12px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 12px;
    font-family: var(--mono);
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
}

.filter-btn:hover {
    border-color: var(--accent);
    color: var(--text);
}

.filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 600;
}

.divider {
    width: 1px;
    height: 24px;
    background: var(--border);
    margin: 0 4px;
}

.search-wrap input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 12px 6px 12px;
    color: var(--text);
    font-size: 13px;
    font-family: var(--thai);
    width: 220px;
    outline: none;
    transition: border-color .15s;
}

.search-wrap input:focus {
    border-color: var(--accent);
}

.view-toggle {
    display: flex;
}

.view-btn {
    padding: 5px 12px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 12px;
    font-family: var(--mono);
    cursor: pointer;
}

.view-btn.active {
    background: var(--surface);
    color: var(--text);
    border-color: var(--accent);
    z-index: 1;
    font-weight: 600;
}

main {
    padding: 20px 24px 40px;
}

.week-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 10px;
}

.day-col {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
}

.day-header {
    padding: 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface2);
}

.day-name {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--text);
}

.day-date {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
}

.day-count {
    font-family: var(--mono);
    font-size: 12px;
    background: var(--bg);
    padding: 2px 8px;
    border-radius: 10px;
    color: var(--muted);
    font-weight: 500;
}

.day-tasks {
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.task-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    cursor: pointer;
    transition: all .15s;
    border-left: 3px solid var(--plan);
}

.task-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(0, 0, 0, .1);
}

.task-card.is-loto {
    background: var(--loto-bg);
    border-color: rgba(234, 179, 8, 0.4);
}

.is-sis {
    color: var(--cold) !important;
}

.is-sis .task-equip {
    color: var(--cold) !important;
}

.is-sis .task-desc {
    color: var(--cold) !important;
}

.task-card.status-new {
    border-left-color: var(--new);
}

.task-card.status-cancelled {
    border-left-color: var(--cancel);
    opacity: 0.65;
    filter: grayscale(0.8);
}

.task-type-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 8px;
    flex-wrap: wrap;
}

.badge {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 4px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
}

.badge.plan {
    background: var(--plan-bg);
    color: var(--plan);
    border: 1px solid var(--plan);
}

.badge.new-badge {
    background: var(--new-bg);
    color: var(--new);
    border: 1px solid var(--new);
}

.badge.cancel {
    background: var(--cancel-bg);
    color: var(--cancel);
    border: 1px solid var(--cancel);
}

.badge.sis {
    background: var(--sis-bg);
    color: var(--sis);
    border: 1px solid var(--sis);
}

.badge.loto {
    background: var(--unplan-bg);
    color: var(--unplan);
    border: 1px solid var(--unplan);
}

.badge.group {
    background: rgba(128, 128, 128, .1);
    color: var(--muted);
    border: 1px solid var(--border);
}

.task-equip {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent);
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 6px;
}

.task-desc {
    font-size: 13px;
    font-weight: 400;
    color: var(--text);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

.task-cancelled .task-desc {
    text-decoration: line-through;
}

.task-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 10px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
}

.task-resp {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
}

.list-view {
    display: none;
}

.list-view.visible {
    display: block;
    overflow-x: auto;
}

.week-grid.visible {
    display: grid;
}

.week-grid.hidden {
    display: none;
}

.list-table {
    width: 100%;
    min-width: 1100px;
    border-collapse: collapse;
    font-size: 13px;
}

.list-table th {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 12px 16px;
    text-align: left;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    font-weight: 600;
}

.list-table td {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
    line-height: 1.5;
}

.list-table tr {
    background: var(--surface);
    transition: background .1s;
}

.list-table tr:hover {
    background: var(--surface2);
}

.list-table tr.status-new {
    border-left: 3px solid var(--new);
}

.list-table tr.status-cancelled {
    border-left: 3px solid var(--cancel);
    opacity: 0.65;
    filter: grayscale(0.8);
}

.list-table tr.status-normal {
    border-left: 3px solid var(--plan);
}

.list-table tr.is-loto td {
    background: var(--loto-bg);
}

.list-table tr.is-sis td {
    color: var(--cold);
}

.list-day-box {
    display: flex;
    flex-direction: column;
    gap: 4px;
}

.list-day {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
}

.list-date {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
}

.modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, .8);
    z-index: 200;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
}

.modal-overlay.open {
    display: flex;
}

.modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    width: 600px;
    padding: 28px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
}

.modal-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 24px;
}

.modal-close {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    width: 32px;
    height: 32px;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
}

.modal-close:hover {
    border-color: var(--accent);
    color: var(--text);
}

.modal-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
}

.modal-field {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
}

.modal-field.full {
    grid-column: 1 / -1;
}

.field-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.field-value {
    font-size: 14px;
    color: var(--text);
    font-weight: 400;
    line-height: 1.5;
}

#loading {
    text-align: center;
    padding: 60px;
    color: var(--accent);
    font-family: var(--mono);
    font-size: 14px;
}

@media (max-width: 1024px) {
    .week-grid {
        grid-template-columns: repeat(3, 1fr);
    }
}

@media (max-width: 768px) {
    .week-grid {
        grid-template-columns: 1fr;
    }

    .filter-bar {
        flex-direction: column;
        align-items: flex-start;
    }

    .search-wrap input {
        width: 100%;
    }

    .header-right {
        gap: 12px;
    }

    .stat-label {
        display: none;
    }
}


/* === UI Refresh: Corporate Elegant Layer === */
:root {
    --shadow-soft: 0 8px 24px rgba(15, 23, 42, 0.10);
    --shadow-hover: 0 12px 28px rgba(15, 23, 42, 0.16);
    --radius-xl: 14px;
    --radius-lg: 10px;
    --radius-md: 8px;
    --corporate-accent: #0f4c81;
    --corporate-accent-2: #1f6aa5;
}

body {
    background:
        linear-gradient(180deg, rgba(148, 163, 184, 0.10) 0%, transparent 30%),
        radial-gradient(900px 420px at -10% -15%, rgba(15, 76, 129, 0.14), transparent 55%),
        var(--bg);
}

body.theme-light {
    background:
        linear-gradient(180deg, rgba(148, 163, 184, 0.10) 0%, transparent 36%),
        radial-gradient(860px 380px at -10% -15%, rgba(15, 76, 129, 0.11), transparent 52%),
        #f3f6fa;
}

header {
    backdrop-filter: blur(8px);
    border-bottom: 1px solid color-mix(in srgb, var(--border) 82%, transparent);
    background: color-mix(in srgb, var(--surface) 92%, transparent);
    box-shadow: 0 3px 14px rgba(15, 23, 42, 0.08);
}

.logo-icon {
    border-radius: 8px;
    background: linear-gradient(135deg, var(--corporate-accent), var(--corporate-accent-2));
    box-shadow: 0 6px 14px rgba(15, 76, 129, 0.22);
}

.logo-text {
    letter-spacing: 1.2px;
}

.theme-toggle,
.view-btn,
.filter-btn,
#weekSelect,
#revSelect,
.search-wrap input {
    border-radius: 999px !important;
}

.theme-toggle {
    padding: 6px 14px;
    background: color-mix(in srgb, var(--surface2) 80%, transparent);
}

.filter-bar {
    position: sticky;
    top: 65px;
    z-index: 95;
    backdrop-filter: blur(6px);
    background: color-mix(in srgb, var(--surface2) 92%, transparent);
    border-bottom: 1px solid color-mix(in srgb, var(--border) 86%, transparent);
}

.filter-btn.active {
    background: var(--corporate-accent);
    border-color: var(--corporate-accent);
}

.search-wrap input {
    width: min(260px, 65vw);
    box-shadow: inset 0 1px 2px rgba(15, 23, 42, 0.06);
}

.search-wrap input:focus {
    border-color: var(--corporate-accent);
    box-shadow: 0 0 0 3px rgba(15, 76, 129, 0.14);
}

main {
    max-width: 1580px;
    margin: 0 auto;
    padding-top: 22px;
}

.week-grid {
    gap: 12px;
}

.day-col {
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow-soft);
    border-color: color-mix(in srgb, var(--border) 78%, transparent);
    transition: transform 0.18s ease, box-shadow 0.18s ease;
}

.day-col:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-hover);
}

.day-header {
    padding: 14px;
    background: linear-gradient(
        180deg,
        color-mix(in srgb, var(--surface2) 94%, transparent),
        color-mix(in srgb, var(--surface) 90%, transparent)
    );
}

.day-count {
    background: rgba(15, 76, 129, 0.10);
    border: 1px solid rgba(15, 76, 129, 0.22);
    color: var(--corporate-accent);
}

.task-card {
    border-radius: var(--radius-md);
    border-left-width: 4px;
    box-shadow: 0 2px 10px rgba(15, 23, 42, 0.08);
}

.task-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 22px rgba(15, 23, 42, 0.14);
}

.badge {
    border-radius: 999px;
    letter-spacing: 0.6px;
}

.list-view.visible {
    background: color-mix(in srgb, var(--surface) 97%, transparent);
    border: 1px solid color-mix(in srgb, var(--border) 84%, transparent);
    border-radius: var(--radius-xl);
    overflow: hidden;
    box-shadow: var(--shadow-soft);
}

.list-table th {
    position: sticky;
    top: 0;
    z-index: 2;
    background: color-mix(in srgb, var(--surface2) 96%, transparent);
}

.list-table tr {
    transition: background 0.14s ease, transform 0.14s ease;
}

.list-table tr:hover {
    transform: translateY(-1px);
}

.modal-overlay {
    background: rgba(2, 6, 23, 0.54);
}

.modal {
    border-radius: 14px;
    border: 1px solid color-mix(in srgb, var(--border) 86%, transparent);
    background: color-mix(in srgb, var(--surface) 96%, transparent);
    backdrop-filter: blur(10px);
    box-shadow: 0 18px 46px rgba(2, 6, 23, 0.24);
    animation: fadeUp 0.22s ease;
}

.modal-field {
    border-radius: var(--radius-lg);
}

@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@media (max-width: 768px) {
    header {
        height: auto;
        padding: 10px 14px;
        align-items: flex-start;
        gap: 10px;
    }

    .header-right {
        width: 100%;
        justify-content: space-between;
        flex-wrap: wrap;
    }

    .filter-bar {
        top: 84px;
        padding: 10px 14px;
    }

    main {
        padding: 16px 14px 26px;
    }

    .list-view.visible {
        border-radius: 12px;
    }

    .modal {
        width: min(94vw, 620px);
        padding: 18px;
    }

    .modal-grid {
        grid-template-columns: 1fr;
    }
}

/* === Dispatch Board Adapt Layer === */
body {
    background:
        radial-gradient(900px 500px at 12% 8%, rgba(56, 189, 248, 0.22), transparent 58%),
        radial-gradient(860px 500px at 92% 5%, rgba(244, 114, 182, 0.18), transparent 55%),
        #d7e4ea;
    padding: 20px;
}

.dispatch-shell {
    max-width: 1560px;
    margin: 0 auto;
    display: flex;
    gap: 14px;
    align-items: stretch;
    min-height: calc(100vh - 40px);
}

.dispatch-sidebar {
    width: 64px;
    border-radius: 12px;
    background: linear-gradient(180deg, #091225 0%, #0c1b2e 100%);
    border: 1px solid rgba(148, 163, 184, 0.18);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 8px;
    gap: 10px;
    box-shadow: 0 14px 34px rgba(9, 18, 37, 0.28);
}

.dispatch-brand {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    background: linear-gradient(140deg, #1d4ed8, #0ea5e9);
    color: #fff;
    display: grid;
    place-items: center;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 6px;
}

.dispatch-nav {
    display: flex;
    flex-direction: column;
    gap: 8px;
    width: 100%;
    align-items: center;
}

.dispatch-nav-btn {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    border: 1px solid rgba(148, 163, 184, 0.24);
    background: transparent;
    color: #cbd5e1;
    font-family: var(--mono);
    font-size: 11px;
    cursor: pointer;
    transition: 0.2s ease;
}

.dispatch-nav-btn:hover,
.dispatch-nav-btn.active {
    background: #1677ff;
    color: #fff;
    border-color: transparent;
}

.dispatch-board {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 0;
}

.dispatch-board-top {
    height: 44px;
    border-radius: 12px 12px 0 0;
    background: rgba(255, 255, 255, 0.86);

// --- เธเธฑเธเธเนเธเธฑเธเธเธฑเธ” Format เธงเธฑเธเธ—เธตเน (เธ•เธฑเธ” GMT เธญเธญเธ) ---
function formatShortDate(dateString) {
    if ( !dateString) return '-';

    // เธ–เนเธฒเธกเธฑเธเธกเธตเธเธณเธงเนเธฒ GMT เธซเธฃเธทเธญ เน€เธงเธฅเธฒเธญเธดเธเนเธ”เธเธตเธ เนเธซเนเธ”เธถเธเน€เธเธเธฒเธฐเธเนเธงเธ "Mar 23 2026"
    if (dateString.length > 15 && dateString.includes('GMT')) {
        return dateString.substring(4, 15);
    }

    // เธ—เนเธฒเธกเธฒเธ•เธฃเธเธฒเธ
    try {
        const d=new Date(dateString);

        if ( !isNaN(d.getTime())) {
            const months=["Jan",
            "Feb",
            "Mar",
            "Apr",
            "May",
            "Jun",
            "Jul",
            "Aug",
            "Sep",
            "Oct",
            "Nov",
            "Dec"];

            return `${
                months[d.getMonth()]
            }

            ${
                d.getDate()
            }

            ${
                d.getFullYear()
            }

            `;
        }
    }

    catch(e) {}

    return dateString;
}

    const revs=[...new Set(weekTasks.map(t=> t.rev))].filter(Boolean).sort();

        revSelect.innerHTML=renderOptionList(revs);

        const latestRev=revs[revs.length - 1];

        changeRev(latestRev);

    else {

function changeRev(selectedRev) {
    const weekTasks=fullDataStore;
    const revs=[...new Set(weekTasks.map(t=> t.rev))].filter(Boolean).sort();

    // เธซเธฒเธงเนเธฒ Rev เธ—เธตเนเน€เธฃเธฒเน€เธฅเธทเธญเธเธญเธขเธนเนเธฅเธณเธ”เธฑเธเธ—เธตเนเน€เธ—เนเธฒเนเธซเธฃเน เธเธฐเนเธ”เนเนเธเธซเธฒ Rev เธ•เธฑเธงเธเนเธญเธเธซเธเนเธฒเธกเธฒเน€เธ—เธตเธขเธเธ–เธนเธ
    const currentRevIndex=revs.indexOf(selectedRev);
    const prevRev=currentRevIndex>0 ? revs[currentRevIndex - 1]: null;

    const currentData=weekTasks.filter(t=> t.rev===selectedRev);
    const oldData=prevRev ? weekTasks.filter(t=> t.rev===prevRev): [];

    allData=[];

    function makeKey(t) {
        return t.date+"|"+t.equipment+"|"+t.description;
    }

    const currentKeys=currentData.map(makeKey);
    const oldKeys=oldData.map(makeKey);

    // เธชเนเธเธเธซเธฒเธเธฒเธ NEW เนเธฅเธฐ NORMAL
    currentData.forEach(t=> {
            const key=makeKey(t);
            t.status=(oldData.length > 0 && !oldKeys.includes(key)) ? "NEW" : "NORMAL";
            allData.push(t);
        });

    // เธชเนเธเธเธซเธฒเธเธฒเธ CANCELLED
    if (oldData.length > 0) {
        oldData.forEach(t=> {
                const key=makeKey(t);

                if ( !currentKeys.includes(key)) {
                    t.status="CANCELLED";
                    allData.push(t);
                }
            });
    }

    // เธญเธฑเธเน€เธ”เธ•เธซเธเนเธฒเธเธญ
    renderAfterDataChange();
}

// ๐ 3. เธเธฑเธเธเนเธเธฑเธเธชเธณเธซเธฃเธฑเธเธงเธฒเธ”เธซเธเนเธฒเธเธญเนเธซเธกเนเธซเธฅเธฑเธเธเธฒเธเธเธณเธเธงเธ“เธเนเธญเธกเธนเธฅเน€เธชเธฃเนเธ

if (window.innerWidth <=768) {

function buildGroup(containerId, items, activeSet) {

    return allData.filter(r=> {
            const d=(r.day||'').toUpperCase().substring(0, 3);
            return activeDays.has(d) && activeGroups.has(r.group) && activeStatuses.has(r.status) && ( !q || (r.description||'').toLowerCase().includes(q) || (r.equipment||'').toLowerCase().includes(q));
        });
}

function render() {
    const data=getFiltered();
    updateHeaderStats(data);
    if (viewMode==='week') renderWeek(data);
    else renderList(data);
}

function updateHeaderStats(data) {
    const newTasks=data.filter(r=> r.status==='NEW').length;
    const cancelled=data.filter(r=> r.status==='CANCELLED').length;

    document.getElementById('headerStats').innerHTML=` <div class="stat"><div class="stat-num">${
        data.length
    }

    </div><div class="stat-label">Tasks</div></div><div class="stat"><div class="stat-num" style="color:var(--new)">${
        newTasks
    }

    </div><div class="stat-label">New Added</div></div><div class="stat"><div class="stat-num" style="color:var(--cancel)">${
        cancelled
    }

    </div><div class="stat-label">Cancelled</div></div>`;
}

function renderWeek(data) {
    const weekView=document.getElementById('weekView');
    weekView.innerHTML='';
    weekView.classList.add('visible');

    availableDays.forEach(day=> {
            const tasks=data.filter(r=> (r.day||'').toUpperCase().startsWith (day));
            const col=document.createElement('div');
            col.className='day-col';

            // ๐ เธ”เธถเธเธงเธฑเธเธ—เธตเนเธกเธฒเนเธเธฅเธเนเธซเนเธชเธฑเนเธเธฅเธ
            const dateStr=tasks.length > 0 ? formatShortDate(tasks[0].date) : '';

            col.innerHTML=` <div class="day-header" style="display:flex; flex-direction:column; align-items:flex-start;" > <div style="display:flex; justify-content:space-between; width:100%; align-items:center;" > <div class="day-name" >${
                day
            }

            </div> <div class="day-count" >${
                tasks.length
            }

            </div> </div> <div class="day-date" >${
                dateStr
            }

            </div> </div> <div class="day-tasks" ></div> `;

            const body=col.querySelector('.day-tasks');
            if (tasks.length===0) body.innerHTML='<div class="empty-day" style="text-align:center; padding:20px; color:var(--muted)">-</div>';
            else tasks.forEach(t=> body.appendChild(makeCard(t)));

            weekView.appendChild(col);
        });
}

function makeCard(t) {
    const card=document.createElement('div');
    const swpText=(t.swp || '').toUpperCase();
    const isLoto=swpText.includes('LOTO') || swpText.includes('SIMPLE LOCK');
    const isSis=(t.moc||'').toUpperCase().includes('SIS') || (t.jobType||'').toUpperCase().includes('SIS') || (t.group||'').toUpperCase().includes('SIS');
    const isNew=t.status==='NEW';
    const isCan=t.status==='CANCELLED';

    card.className=`task-card status-${
        t.status.toLowerCase()
    }

    `;
    if(isLoto) card.classList.add('is-loto');
    if(isSis) card.classList.add('is-sis');
    if(isCan) card.classList.add('task-cancelled');

    let badges='';
    if(isNew) badges+=`<span class="badge new-badge">NEW</span>`;
    if(isCan) badges+=`<span class="badge cancel">CANCELLED</span>`;
    if(isLoto) badges+=`<span class="badge loto">LOTO</span>`;
    if(isSis) badges+=`<span class="badge sis">SIS</span>`;

    badges+=`<span class="badge plan">${
        t.jobType || '-'
    }

    </span>`;

    badges+=`<span class="badge group">${
        t.group || '-'
    }

    </span>`;

    card.innerHTML=` <div class="task-type-row">${
        badges
    }

    </div><div class="task-equip">${
        t.equipment || 'N/A'
    }

    </div><div class="task-desc">${
        t.description || '-'
    }

    </div><div class="task-footer"><div class="task-resp">${
        t.resp || '-'
    }

    </div><div class="task-resp">${
        t.area || '-'
    }

    </div></div>`;
    card.onclick=()=>openModal(t, isLoto, isSis, isNew, isCan);
    return card;
}

function renderList(data) {
    const body=document.getElementById('listBody');
    body.innerHTML='';

    data.forEach(t=> {
            const swpText=(t.swp || '').toUpperCase();
            const isLoto=swpText.includes('LOTO') || swpText.includes('SIMPLE LOCK');
            const isSis=(t.moc||'').toUpperCase().includes('SIS') || (t.jobType||'').toUpperCase().includes('SIS') || (t.group||'').toUpperCase().includes('SIS');

            const tr=document.createElement('tr');

            tr.className=`status-${
                t.status.toLowerCase()
            }

            ${
                isLoto?'is-loto':''
            }

            ${
                isSis?'is-sis':''
            }

            `;

            let statusBadge='';
            if(t.status==='NEW') statusBadge='<br><span class="badge new-badge" style="margin-top:6px">NEW</span>';
            if(t.status==='CANCELLED') statusBadge='<br><span class="badge cancel" style="margin-top:6px">CANCEL</span>';

            // ๐ เนเธเธฅเธเธงเธฑเธเธ—เธตเนเนเธซเนเธชเธฑเนเธเธฅเธเนเธเธซเธเนเธฒ List เธ”เนเธงเธข
            const cleanDate=formatShortDate(t.date);

            tr.innerHTML=` <td> <div class="list-day-box" > <span class="list-day" >${
                t.day||'-'
            }

            </span> <span class="list-date" >${
                cleanDate
            }

            </span> </div> </td> <td><span class="badge plan" >${
                t.jobType||'-'
            }

            </span><br><small style="color:var(--muted);font-size:11px;font-family:var(--mono);" >${
                t.moc||'-'
            }

            </small>${
                statusBadge
            }

            </td> <td style="font-family:var(--mono);font-size:14px;font-weight:600;color:var(--accent);" >${
                t.equipment||'-'
            }

            </td> <td style="max-width:320px;line-height:1.6;font-size:13px; ${t.status==='CANCELLED'?'text-decoration:line-through;color:var(--muted)':''}" >${
                t.description
            }

            </td> <td><span class="badge group" >${
                t.group||'-'
            }

            </span></td> <td><span style="font-size:12px;color:var(--muted)" >${
                t.workType||'-'
            }

            </span></td> <td style="font-family:var(--mono);font-size:12px; ${isLoto?'color:var(--unplan);font-weight:700':''}" >${
                t.swp||'-'
            }

            </td> <td><span style="font-size:12px" >${
                t.area||'-'
            }

            </span></td> <td style="font-family:var(--mono);font-size:12px;color:var(--muted)" >${
                t.resp||'-'
            }

            </td> `;
            tr.style.cursor='pointer';
            tr.onclick=()=> openModal(t, isLoto, isSis, t.status==='NEW', t.status==='CANCELLED');
            body.appendChild(tr);
        });
}

function openModal(t, isLoto, isSis, isNew, isCan) {
    let badges='';
    if(isNew) badges+=`<span class="badge new-badge">NEW</span>`;
    if(isCan) badges+=`<span class="badge cancel">CANCELLED</span>`;
    if(isLoto) badges+=`<span class="badge loto">LOTO</span>`;
    if(isSis) badges+=`<span class="badge sis">SIS</span>`;

    badges+=`<span class="badge plan">${
        t.jobType || '-'
    }

    </span>`;

    badges+=`<span class="badge group">${
        t.group || '-'
    }

    </span>`;

    document.getElementById('modalTitle').innerHTML=` <div style="display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap">${
        badges
    }

    </div><div style="font-family:var(--mono);color:var(--accent);font-size:16px;margin-bottom:10px;font-weight:700;">${
        t.equipment||'N/A'
    }

    </div><div style="font-size:14px;font-weight:400;color:var(--text);line-height:1.6; ${isCan?'text-decoration:line-through;color:var(--muted)':''}">${
        t.description
    }

    </div>`;

    // ๐ เนเธเธฅเธเธงเธฑเธเธ—เธตเนเนเธ Modal เนเธซเนเธชเธฑเนเธเธ”เนเธงเธข
    const cleanDate=formatShortDate(t.date);

    const fields=[ {

        label:"Day / Date",
        value:`${
            t.day||'-'
        }

        ยท ${
            cleanDate
        }

        `,
        full:false
    }

    ,
    {
    label: "Area", value:t.area||'-', full:false
}

,
{
label: "Responsible", value:t.resp||'-', full:false
}

,
{
label: "Status", value:t.status, full:false
}

,
{
label: "Work Type", value:t.workType||'-', full:false
}

,
{
label: "MOC/TMOC", value:t.moc||'-', full:false
}

,
{
label: "SWP Document", value:t.swp||'-', full:true
}

];

document.getElementById('modalGrid').innerHTML=fields.map(f=> ` <div class="modal-field ${f.full?'full':''}" > <div class="field-label" >${
        f.label
    }

    </div> <div class="field-value ${f.label!=='Work Description' ? 'mono' : ''}" >${
        f.value
    }

    </div> </div> `).join('');
document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) {
    if (e.target===document.getElementById('modalOverlay')) closeModalDirect();
}

function closeModalDirect() {
    document.getElementById('modalOverlay').classList.remove('open');
}

document.addEventListener('keydown', e=> {
        if (e.key==='Escape') closeModalDirect();
    });
</script></body></html>
